<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1e1e2e"/>

  <!-- Bar chart — severity colors: blocker=purple, critical=red, major=orange, minor=yellow, info=gray -->
  <!-- Bar 1 — blocker -->
  <rect x="8"  y="20"  width="18" height="96" rx="4" fill="#9b59b6"/>
  <!-- Bar 2 — critical -->
  <rect x="30" y="38"  width="18" height="78" rx="4" fill="#e53935"/>
  <!-- Bar 3 — major -->
  <rect x="52" y="54"  width="18" height="62" rx="4" fill="#f4511e"/>
  <!-- Bar 4 — minor -->
  <rect x="74" y="72"  width="18" height="44" rx="4" fill="#f9a825"/>
  <!-- Bar 5 — info -->
  <rect x="96" y="92"  width="18" height="24" rx="4" fill="#78909c"/>

  <!-- Baseline -->
  <rect x="6" y="117" width="116" height="3" rx="1.5" fill="#ffffff22"/>
</svg>
