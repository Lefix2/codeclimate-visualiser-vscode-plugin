name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g. 1.2.3) — defaults to package.json'
        required: false
      publish:
        description: 'Publish to VS Code Marketplace'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  release:
    name: Package & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - name: Sync version from input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: npm version --no-git-tag-version "${{ github.event.inputs.version }}"

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npm run package

      - name: Upload VSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload "$GITHUB_REF_NAME" *.vsix --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish
